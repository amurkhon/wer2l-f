
services:
  lab-ims-frontend:
    container_name: lab-ims-frontend
    restart: always
    image: node:20.10.0
    ports:
      - 4006:4006
    environment:
      - PORT=4006
      - NODE_ENV=production
    env_file:
      - .env.local
    volumes:
      - ./:/usr/src/lab-ims-frontend
      - /usr/src/lab-ims-frontend/node_modules
    working_dir: /usr/src/lab-ims-frontend
    networks:
      - client-network
    command: bash -c "yarn install --frozen-lockfile && yarn build && yarn start"

networks:
  client-network:
    driver: bridge